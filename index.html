<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>PerspectiveOS — See Every Story Through Opposing Eyes</title>
    <meta name="description" content="PerspectiveOS is an AI-powered media literacy and geopolitical intelligence dashboard. Cross-analyze how 30+ ideologically diverse sources frame the same event — exposing bias, omissions, and hidden narratives in real time." />
    <meta name="keywords" content="media bias, news analysis, geopolitical intelligence, perspective engine, AI news, media literacy, cross-source analysis, fact check, news aggregator" />
    <meta name="author" content="PerspectiveOS" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://perspectiveos.vercel.app/" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://perspectiveos.vercel.app/" />
    <meta property="og:title" content="PerspectiveOS — See Every Story Through Opposing Eyes" />
    <meta property="og:description" content="AI-powered media literacy dashboard. Cross-analyze how BBC, Fox, RT, Al Jazeera and 26 more sources frame the same story — exposing what each emphasizes, omits, and distorts." />
    <meta property="og:image" content="https://perspectiveos.vercel.app/og-image.png" />
    <meta property="og:site_name" content="PerspectiveOS" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://perspectiveos.vercel.app/" />
    <meta name="twitter:title" content="PerspectiveOS — See Every Story Through Opposing Eyes" />
    <meta name="twitter:description" content="AI cross-analyzes how 30+ sources frame the same event. See bias, omissions, and loaded language exposed side-by-side." />
    <meta name="twitter:image" content="https://perspectiveos.vercel.app/og-image.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Structured data (WebApplication) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PerspectiveOS",
      "url": "https://perspectiveos.vercel.app/",
      "description": "AI-powered media literacy and geopolitical intelligence dashboard that cross-analyzes how ideologically diverse news sources frame the same event.",
      "applicationCategory": "NewsApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Cross-source perspective analysis",
        "Bias color-coding",
        "Loaded language detection",
        "Socratic question generation",
        "Real-time geopolitical map",
        "Social media signal aggregation",
        "Keyword alert watchlist"
      ]
    }
    </script>

    <!-- Fonts + Map -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet" />
  </head>
  <body class="bg-bg text-white overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
